<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="360" viewBox="0 0 1100 360" role="img" aria-labelledby="title"><title>Nightly Price Boxplot</title><style>text { font-family: Arial, Helvetica, sans-serif; fill: #17324D; }.title { font-size: 28px; font-weight: 700; }.axis-label { font-size: 16px; font-weight: 600; }.tick { font-size: 13px; }.value { font-size: 12px; font-weight: 600; }.legend { font-size: 13px; }</style><rect x="0" y="0" width="1100" height="360" fill="#FFFFFF" /><text x="550.00" y="45.00" text-anchor="middle" fill="#17324D" class="title">Nightly Price Boxplot</text><text x="570.00" y="342.00" text-anchor="middle" fill="#17324D" class="axis-label">Nightly price</text><text x="1050.00" y="72.00" text-anchor="end" fill="#17324D" class="legend">Axis capped at EUR 400 to keep the IQR readable</text><line x1="90.00" y1="100.00" x2="90.00" y2="290.00" stroke="#D7DEE6" stroke-width="1.00" stroke-dasharray="4 4" /><text x="90.00" y="314.00" text-anchor="middle" fill="#17324D" class="tick">EUR 0</text><line x1="330.00" y1="100.00" x2="330.00" y2="290.00" stroke="#D7DEE6" stroke-width="1.00" stroke-dasharray="4 4" /><text x="330.00" y="314.00" text-anchor="middle" fill="#17324D" class="tick">EUR 100</text><line x1="570.00" y1="100.00" x2="570.00" y2="290.00" stroke="#D7DEE6" stroke-width="1.00" stroke-dasharray="4 4" /><text x="570.00" y="314.00" text-anchor="middle" fill="#17324D" class="tick">EUR 200</text><line x1="810.00" y1="100.00" x2="810.00" y2="290.00" stroke="#D7DEE6" stroke-width="1.00" stroke-dasharray="4 4" /><text x="810.00" y="314.00" text-anchor="middle" fill="#17324D" class="tick">EUR 300</text><line x1="1050.00" y1="100.00" x2="1050.00" y2="290.00" stroke="#D7DEE6" stroke-width="1.00" stroke-dasharray="4 4" /><text x="1050.00" y="314.00" text-anchor="middle" fill="#17324D" class="tick">EUR 400</text><line x1="90.00" y1="290.00" x2="1050.00" y2="290.00" stroke="#17324D" stroke-width="1.50" /><line x1="109.20" y1="195.00" x2="294.00